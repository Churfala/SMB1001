name: Build & Deploy (Test)

on:
  push:
    branches: [develop]

env:
  REGISTRY: ghcr.io
  ORG: churfala

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.ORG }}/smb1001-api:dev
          cache-from: type=gha,scope=api-dev
          cache-to: type=gha,mode=max,scope=api-dev

      - name: Build & push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: worker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.ORG }}/smb1001-worker:dev
          cache-from: type=gha,scope=worker-dev
          cache-to: type=gha,mode=max,scope=worker-dev

      - name: Build & push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.ORG }}/smb1001-frontend:dev
          cache-from: type=gha,scope=frontend-dev
          cache-to: type=gha,mode=max,scope=frontend-dev
          build-args: |
            VITE_API_URL=https://controlcheckapi-test.globaltechnology.nz

      - name: Images pushed
        run: echo "Test images pushed to GHCR (:dev tags). Redeploy the test stack in Portainer to pick up the new images."

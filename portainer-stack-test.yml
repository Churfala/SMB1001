version: '3.8'

# TEST ENVIRONMENT — mirrors portainer-stack.yml but uses :dev images,
# separate container names, separate volumes, and separate DB.
# Point Cloudflare tunnels at:
#   controlcheck-test.globaltechnology.nz  → smb1001_test_frontend:80
#   controlcheckapi-test.globaltechnology.nz → smb1001_test_api:3000

services:
  postgres:
    image: postgres:15-alpine
    container_name: smb1001_test_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-smb1001_test}
      POSTGRES_USER: ${DB_USER:-smb1001user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_strong_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-smb1001user} -d ${DB_NAME:-smb1001_test}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cftunnel_default

  redis:
    image: redis:7-alpine
    container_name: smb1001_test_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cftunnel_default

  api:
    image: ghcr.io/churfala/smb1001-api:dev
    container_name: smb1001_test_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-smb1001_test}
      DB_USER: ${DB_USER:-smb1001user}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      API_PORT: ${API_PORT:-3000}
      API_HOST: ${API_HOST:-0.0.0.0}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-10}
      FRONTEND_URL: ${FRONTEND_URL}
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cftunnel_default
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  worker:
    image: ghcr.io/churfala/smb1001-worker:dev
    container_name: smb1001_test_worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-smb1001_test}
      DB_USER: ${DB_USER:-smb1001user}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-ControlCheck Test <noreply@globaltechnology.nz>}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cftunnel_default

  frontend:
    image: ghcr.io/churfala/smb1001-frontend:dev
    container_name: smb1001_test_frontend
    restart: unless-stopped
    networks:
      - cftunnel_default

volumes:
  pgdata:
    name: smb1001_test_pgdata
  redisdata:
    name: smb1001_test_redisdata
  uploads:
    name: smb1001_test_uploads

networks:
  cftunnel_default:
    external: true
